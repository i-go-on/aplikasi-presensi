<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Presensi Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        #qrcode { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
        <!-- Kontainer untuk semua view -->
        <div id="login-view">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Selamat Datang</h1>
            <p class="text-slate-500 mb-8">Login dengan akun Google Anda untuk memulai.</p>
            <!-- [FIX] Elemen g_id_onload yang menyebabkan error telah dihapus -->
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>
        <div id="setup-view" class="hidden">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Buat Sesi Presensi</h1>
            <p class="text-slate-500 mb-6">Masukkan nama kegiatan untuk membuat QR Code.</p>
            <form id="activity-form">
                <input type="text" id="activity-name" class="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mb-4" placeholder="Contoh: Seminar Digital Marketing" required>
                <button type="submit" id="generate-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 disabled:bg-slate-400">Buat QR Code</button>
            </form>
        </div>
        <div id="qrcode-view" class="hidden">
            <h1 id="qrcode-title" class="text-3xl font-bold text-slate-800 break-words"></h1>
            <p class="text-slate-500 mt-2 mb-6">Peserta dapat memindai kode ini untuk presensi.</p>
            <div id="qrcode" class="bg-white p-4 rounded-xl shadow-inner inline-block"></div>
            <button id="close-session-btn" class="mt-8 w-full bg-red-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-red-700 disabled:bg-red-400">Tutup Sesi Presensi</button>
            <button id="reset-btn" class="mt-4 w-full bg-slate-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-slate-700 text-sm">Buat Sesi Baru</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZrpZvulJyPypwPxvbu8HeonNQ2FbhlBSpH28zF-3fb82F2qFcxuE1llUoB2OLpmpr6A/exec';
        const CLIENT_ID = '172721035015-pu7jjsrm7572jm4vtrb36ussvj4ne5qa.apps.googleusercontent.com';

        let googleIdToken = null;
        let currentActivityName = '';
        const views = { login: document.getElementById('login-view'), setup: document.getElementById('setup-view'), qrcode: document.getElementById('qrcode-view') };

        function showView(viewName) {
            Object.values(views).forEach(view => view.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
        }

        function handleCredentialResponse(response) {
            googleIdToken = response.credential;
            showView('setup');
        }

        async function callAppsScript(payload) {
            // Kode callAppsScript tetap sama
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: "follow"
                });
                if (!res.ok) throw new Error(`Server Error: Status ${res.status}`);
                const result = await res.json();
                if (result.status !== 'success') throw new Error(`Script Error: ${result.message}`);
                return result;
            } catch (error) {
                if (error instanceof TypeError && error.message.includes('Failed to fetch')) {
                    throw new Error('Network Error: Gagal terhubung ke server. Periksa SCRIPT_URL atau koneksi internet.');
                }
                throw error;
            }
        }

        document.getElementById('activity-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            currentActivityName = document.getElementById('activity-name').value.trim();
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = 'Membuat sheet...';
            try {
                await callAppsScript({ action: 'createSheet', sheetName: currentActivityName, token: googleIdToken });
                const formUrl = new URL(window.location.href);
                formUrl.search = '';
                formUrl.searchParams.set('activity', currentActivityName);
                document.getElementById('qrcode-title').textContent = currentActivityName;
                const qrcodeContainer = document.getElementById('qrcode');
                qrcodeContainer.innerHTML = '';
                new QRCode(qrcodeContainer, { text: formUrl.href, width: 256, height: 256 });
                showView('qrcode');
            } catch (error) {
                alert('Gagal membuat sesi:\n\n' + error.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Buat QR Code';
            }
        });
        
        document.getElementById('close-session-btn').addEventListener('click', async function() {
            if (!confirm(`Apakah Anda yakin ingin menutup sesi presensi untuk "${currentActivityName}"? Aksi ini tidak dapat dibatalkan.`)) return;
            this.disabled = true;
            this.textContent = 'Menutup...';
            try {
                const result = await callAppsScript({ action: 'closeSheet', sheetName: currentActivityName, token: googleIdToken });
                alert(result.message);
                this.textContent = 'Sesi Telah Ditutup';
            } catch (error) {
                alert('Gagal menutup sesi:\n\n' + error.message);
                this.disabled = false;
                this.textContent = 'Tutup Sesi Presensi';
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => { showView('setup'); });

        function getUserLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    return resolve({ latitude: null, longitude: null, timestamp: Date.now() });
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve({ latitude: position.coords.latitude, longitude: position.coords.longitude, timestamp: position.timestamp }),
                    () => resolve({ latitude: null, longitude: null, timestamp: Date.now() })
                );
            });
        }

        async function handleParticipantSignIn(response) {
            const urlParams = new URLSearchParams(window.location.search);
            const activityName = urlParams.get('activity');
            const participantToken = response.credential;
            const mainContainer = document.getElementById('participant-view');
            mainContainer.innerHTML = `<p class="text-lg text-slate-600">Mendapatkan lokasi Anda...</p>`;
            try {
                const location = await getUserLocation();
                mainContainer.innerHTML = `<p class="text-lg text-slate-600">Memproses presensi...</p>`;
                const result = await callAppsScript({ action: 'recordAttendance', sheetName: decodeURIComponent(activityName), token: participantToken, location: location });
                mainContainer.innerHTML = `<div class="mx-auto bg-green-100 rounded-full w-20 h-20 flex items-center justify-center mb-6"><svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div><h1 class="text-2xl font-bold text-slate-800 mb-2">Presensi Berhasil!</h1><p class="text-slate-600 text-lg">Terima kasih, <strong>${result.data}</strong>. Kehadiran Anda telah dicatat.</p>`;
            } catch (error) {
                mainContainer.innerHTML = `<p class="text-red-500 text-lg">❌ Gagal: ${error.message}</p>`;
            }
        }

        window.onload = function() {
            // [FIX] Memeriksa apakah CLIENT_ID sudah diisi
            if (CLIENT_ID.startsWith('MASUKKAN') || CLIENT_ID.length < 10) {
                document.getElementById('main-container').innerHTML = `
                    <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4" role="alert">
                        <p class="font-bold">Konfigurasi Belum Selesai</p>
                        <p>Anda belum mengganti placeholder <strong>CLIENT_ID</strong> di dalam file index.html. Silakan salin Client ID Anda dari Google Cloud Console dan tempelkan ke dalam kode.</p>
                    </div>
                `;
                return; // Menghentikan eksekusi skrip lebih lanjut
            }

            // Inisialisasi Google Sign-In untuk Panitia
            google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { theme: 'outline', size: 'large' });

            const urlParams = new URLSearchParams(window.location.search);
            const activityName = urlParams.get('activity');
            if (activityName) {
                document.body.innerHTML = `
                    <div id="participant-view" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
                        <h1 class="text-2xl font-bold text-slate-800 mb-2 break-words">${decodeURIComponent(activityName)}</h1>
                        <p class="text-slate-500 mb-8">Login dengan Google untuk mencatat kehadiran Anda.</p>
                        <div id="participant-signin-button"></div>
                    </div>
                `;
                
                google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleParticipantSignIn });
                google.accounts.id.renderButton(document.getElementById('participant-signin-button'), { theme: 'outline', size: 'large' });
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Presensi Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        #qrcode { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
        <!-- Kontainer untuk semua view -->
        <div id="login-view">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Selamat Datang</h1>
            <p class="text-slate-500 mb-8">Login dengan akun Google Anda untuk memulai.</p>
            <div id="g_id_onload" data-client_id="172721035015-pu7jjsrm7572jm4vtrb36ussvj4ne5qa.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>
        <div id="setup-view" class="hidden">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Buat Sesi Presensi</h1>
            <p class="text-slate-500 mb-6">Masukkan nama kegiatan untuk membuat QR Code.</p>
            <form id="activity-form">
                <input type="text" id="activity-name" class="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mb-4" placeholder="Contoh: Seminar Digital Marketing" required>
                <button type="submit" id="generate-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 disabled:bg-slate-400">Buat QR Code</button>
            </form>
        </div>
        <div id="qrcode-view" class="hidden">
            <h1 id="qrcode-title" class="text-3xl font-bold text-slate-800 break-words"></h1>
            <p class="text-slate-500 mt-2 mb-6">Peserta dapat memindai kode ini untuk presensi.</p>
            <div id="qrcode" class="bg-white p-4 rounded-xl shadow-inner inline-block"></div>
            <button id="reset-btn" class="mt-8 w-full bg-slate-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-slate-700">Buat Sesi Baru</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVwMfzYgzcr2n4ATuM2BoC60FydELgWIvEQkJRWz40VVV0YhlyX9GvgFFtQT-hfW3a3Q/exec';
        const CLIENT_ID = '172721035015-pu7jjsrm7572jm4vtrb36ussvj4ne5qa.apps.googleusercontent.com'; // [DIUBAH] Client ID dipindahkan ke sini

        let googleIdToken = null; // Token untuk panitia
        const views = { login: document.getElementById('login-view'), setup: document.getElementById('setup-view'), qrcode: document.getElementById('qrcode-view') };

        function showView(viewName) {
            Object.values(views).forEach(view => view.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
        }

        function handleCredentialResponse(response) {
            googleIdToken = response.credential;
            showView('setup');
        }

        async function callAppsScript(payload) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: "follow"
                });
                if (!res.ok) {
                    throw new Error(`Server Error: Status ${res.status}`);
                }
                const result = await res.json();
                if (result.status !== 'success') {
                    throw new Error(`Script Error: ${result.message}`);
                }
                return result;
            } catch (error) {
                if (error instanceof TypeError && error.message.includes('Failed to fetch')) {
                    throw new Error('Network Error: Gagal terhubung ke server. Periksa SCRIPT_URL atau koneksi internet.');
                }
                throw error;
            }
        }

        document.getElementById('activity-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const activityName = document.getElementById('activity-name').value.trim();
            const generateBtn = document.getElementById('generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = 'Membuat sheet...';

            try {
                await callAppsScript({ action: 'createSheet', sheetName: activityName, token: googleIdToken });
                const formUrl = new URL(window.location.href);
                formUrl.search = '';
                formUrl.searchParams.set('activity', activityName);
                document.getElementById('qrcode-title').textContent = activityName;
                const qrcodeContainer = document.getElementById('qrcode');
                qrcodeContainer.innerHTML = '';
                new QRCode(qrcodeContainer, { text: formUrl.href, width: 256, height: 256 });
                showView('qrcode');
            } catch (error) {
                alert('Gagal membuat sesi:\n\n' + error.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Buat QR Code';
            }
        });
        
        document.getElementById('reset-btn').addEventListener('click', () => { showView('setup'); });

        // [BARU] Fungsi callback untuk login peserta
        async function handleParticipantSignIn(response) {
            const urlParams = new URLSearchParams(window.location.search);
            const activityName = urlParams.get('activity');
            const participantToken = response.credential;
            const mainContainer = document.getElementById('participant-view');

            mainContainer.innerHTML = `<p class="text-lg text-slate-600">Memproses presensi...</p>`;

            try {
                const result = await callAppsScript({
                    action: 'recordAttendance',
                    sheetName: decodeURIComponent(activityName),
                    token: participantToken
                });
                // Menampilkan pesan sukses dengan nama peserta
                mainContainer.innerHTML = `
                    <div class="mx-auto bg-green-100 rounded-full w-20 h-20 flex items-center justify-center mb-6">
                        <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-2">Presensi Berhasil!</h1>
                    <p class="text-slate-600 text-lg">Terima kasih, <strong>${result.data}</strong>. Kehadiran Anda telah dicatat.</p>
                `;
            } catch (error) {
                mainContainer.innerHTML = `<p class="text-red-500 text-lg">❌ Gagal: ${error.message}</p>`;
            }
        }

        window.onload = function() {
            // [DIUBAH] Memasukkan Client ID ke dalam div login panitia
            document.getElementById('g_id_onload').dataset.client_id = CLIENT_ID;

            const urlParams = new URLSearchParams(window.location.search);
            const activityName = urlParams.get('activity');
            if (activityName) {
                // [DIUBAH] Tampilan untuk peserta sekarang adalah tombol login
                document.body.innerHTML = `
                    <div id="participant-view" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
                        <h1 class="text-2xl font-bold text-slate-800 mb-2 break-words">${decodeURIComponent(activityName)}</h1>
                        <p class="text-slate-500 mb-8">Login dengan Google untuk mencatat kehadiran Anda.</p>
                        <div id="participant-signin-button"></div>
                    </div>
                `;
                
                // [DIUBAH] Secara manual membuat tombol login Google
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleParticipantSignIn
                });
                google.accounts.id.renderButton(
                    document.getElementById('participant-signin-button'),
                    { type: 'standard', theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', logo_alignment: 'left' }
                );
            }
        };
    </script>
</body>
</html>

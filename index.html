<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Presensi Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        #qrcode { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">

        <!-- Tampilan Login -->
        <div id="login-view">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Selamat Datang</h1>
            <p class="text-slate-500 mb-8">Login dengan akun Google Anda untuk memulai.</p>
            <div id="g_id_onload"
                 data-client_id="172721035015-pu7jjsrm7572jm4vtrb36ussvj4ne5qa.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>

        <!-- Tampilan Setup Kegiatan -->
        <div id="setup-view" class="hidden">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Buat Sesi Presensi</h1>
            <p class="text-slate-500 mb-6">Masukkan nama kegiatan untuk membuat QR Code.</p>
            <form id="activity-form">
                <input type="text" id="activity-name" class="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mb-4" placeholder="Contoh: Seminar Digital Marketing" required>
                <button type="submit" id="generate-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 disabled:bg-slate-400">Buat QR Code</button>
            </form>
        </div>

        <!-- Tampilan QR Code -->
        <div id="qrcode-view" class="hidden">
            <h1 id="qrcode-title" class="text-3xl font-bold text-slate-800 break-words"></h1>
            <p class="text-slate-500 mt-2 mb-6">Peserta dapat memindai kode ini untuk presensi.</p>
            <div id="qrcode" class="bg-white p-4 rounded-xl shadow-inner inline-block"></div>
            <button id="reset-btn" class="mt-8 w-full bg-slate-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-slate-700">Buat Sesi Baru</button>
        </div>

    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmlRHq0yl-hc4ViUnueaXO9eNCr4tGCygl2ZeGUjh-FvNrOqBTKcm8TEFzvwmzGssT8g/exec';

        let googleIdToken = null;
        let qrcodeInstance = null;
        const views = {
            login: document.getElementById('login-view'),
            setup: document.getElementById('setup-view'),
            qrcode: document.getElementById('qrcode-view'),
        };

        function showView(viewName) {
            Object.values(views).forEach(view => view.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
        }

        function handleCredentialResponse(response) {
            googleIdToken = response.credential;
            showView('setup');
        }

        async function callAppsScript(payload) {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload),
                redirect: "follow"
            });
            
            if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);

            const result = await res.json();
            if (result.status !== 'success') throw new Error(result.message);
            return result;
        }

        document.getElementById('activity-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const activityName = document.getElementById('activity-name').value.trim();
            const generateBtn = document.getElementById('generate-btn');
            
            generateBtn.disabled = true;
            generateBtn.textContent = 'Membuat sheet...';

            try {
                await callAppsScript({
                    action: 'createSheet',
                    sheetName: activityName,
                    token: googleIdToken // Kirim token untuk otorisasi
                });

                const formUrl = new URL(window.location.href);
                formUrl.search = '';
                formUrl.searchParams.set('activity', activityName);
                
                document.getElementById('qrcode-title').textContent = activityName;
                const qrcodeContainer = document.getElementById('qrcode');
                qrcodeContainer.innerHTML = '';
                if (!qrcodeInstance) {
                    qrcodeInstance = new QRCode(qrcodeContainer, { width: 256, height: 256, correctLevel: QRCode.CorrectLevel.H });
                }
                qrcodeInstance.makeCode(formUrl.href);
                showView('qrcode');

            } catch (error) {
                alert('Gagal membuat sesi: ' + error.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Buat QR Code';
            }
        });
        
        document.getElementById('reset-btn').addEventListener('click', () => {
            document.getElementById('activity-form').reset();
            showView('setup');
        });

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const activityName = urlParams.get('activity');

            if (activityName) {
                document.body.innerHTML = `
                    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
                        <h1 class="text-2xl font-bold text-slate-800 mb-2 break-words">${decodeURIComponent(activityName)}</h1>
                        <p class="text-slate-500 mb-8">Masukkan ID Anda untuk presensi.</p>
                        <form id="attendance-form-participant">
                            <input type="text" id="participant-id" class="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-lg mb-4" placeholder="ID Peserta" required>
                            <button type="submit" id="submit-attendance" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg">Kirim</button>
                        </form>
                        <div id="attendance-result" class="hidden mt-6"><p class="font-semibold text-lg"></p></div>
                    </div>
                `;
                
                document.getElementById('attendance-form-participant').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const participantId = document.getElementById('participant-id').value;
                    const submitBtn = document.getElementById('submit-attendance');
                    const resultEl = document.querySelector('#attendance-result p');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Mengirim...';

                    try {
                        await callAppsScript({
                            action: 'recordAttendance',
                            sheetName: decodeURIComponent(activityName),
                            participantId: participantId
                        });
                        
                        document.getElementById('attendance-form-participant').classList.add('hidden');
                        resultEl.textContent = '✅ Presensi berhasil!';
                        resultEl.className = 'text-green-600 font-semibold text-lg';
                        document.getElementById('attendance-result').classList.remove('hidden');

                    } catch (error) {
                        resultEl.textContent = '❌ Gagal: ' + error.message;
                        resultEl.className = 'text-red-600 font-semibold text-lg';
                        document.getElementById('attendance-result').classList.remove('hidden');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Kirim';
                    }
                });
            }
        };
    </script>
</body>
</html>
